services:
  neo4j:
    image: neo4j:5.22
    container_name: repo-sql-cypher-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ../artifacts/neo4j/data:/data
      - ../artifacts/neo4j/logs:/logs
      - ../artifacts/neo4j/import:/var/lib/neo4j/import
